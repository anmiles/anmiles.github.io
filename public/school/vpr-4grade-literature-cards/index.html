<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>Карточки</title>

	<script type="text/cards" id="cards-data">

Аксаков: Аленький цветочек

	</script>

	<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

	<style>
		* {
			box-sizing: border-box;
		}

		:root {
			--color-bg-body: #fff8f0;
			--color-bg-card: #ffffff;

			--color-neutral: #ffc952;
			--color-success: #009933;
			--color-fail: #cc0000;

			--color-text: #333333;
			--color-text-light: #ffffff;

			--color-timer-track: #e4e4e4;
			--color-timer-bar: #3b82f6;

			--shadow: 0 10px 30px rgba(0, 0, 0, 0.15);

			--card-width: 480px;
			--card-height: 360px;

			--spacing: 24px;
			--radius: 24px;

			--button-height: 48px;
			--timer-height: 8px;
		}

		html,
		body {
			margin: 0;
			padding: 0;
		}

		body {
			background: var(--color-bg-body);
			color: var(--color-text);
			font-family: "Segoe UI", "Roboto", "Helvetica", sans-serif;
			font-size: 16px;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.app {
			max-width: 100vw;
			padding: 0 var(--spacing);
		}

		.app > * {
			width: var(--card-width);
			max-width: 100%;
			padding: var(--spacing);
			margin: calc(1.5 * var(--spacing)) auto;
		}

		.box {
			background: var(--color-bg-card);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			display: flex;
			flex-direction: column;
			gap: var(--spacing);
			position: relative;
		}

		.card {
			min-height: var(--card-height);
		}

		.card.correct {
			outline: 4px solid var(--color-success);
		}

		.card.correct .error {
			display: none;
		}

		.card.incorrect {
			outline: 4px solid var(--color-fail);
		}

		.card.incorrect .error {
			color: var(--color-fail);
		}

		.content {
			flex: 1;
			display: flex;
			flex-direction: column;
			text-align: center;
			gap: var(--spacing);
			padding: calc(2 * var(--spacing)) 0 var(--spacing) 0;
		}

		.author {
			font-size: 2rem;
			line-height: 1.2;
		}

		.title {
			font-size: 1.5rem;
			line-height: 1.3;
		}

		.buttons {
			display: flex;
			gap: var(--spacing);
		}

		button {
			flex: 1;
			border: none;
			border-radius: var(--radius);
			height: var(--button-height);
			font-weight: bold;
			font-size: 1em;
			cursor: pointer;
			transition: 0.2s;
		}

		button:hover {
			transform: translateY(-1px);
		}

		button:active {
			transform: translateY(0);
		}

		button.neutral {
			background: var(--color-neutral);
			color: var(--color-text);
		}

		button.success {
			background: var(--color-success);
			color: var(--color-text-light);
		}

		button.fail {
			background: var(--color-fail);
			color: var(--color-text-light);
		}

		.timer {
			width: 100%;
			height: var(--timer-height);
			border-radius: 999px;
			overflow: hidden;
			background: var(--color-timer-track);
		}

		.timer-bar {
			height: 100%;
			background: var(--color-timer-bar);
		}

		.stats {
			position: relative;
			overflow: hidden;
			border-radius: var(--radius);
			background: white;
			box-shadow: var(--shadow);
			height: var(--button-height);
			padding: 0;
			display: flex;
		}

		.stats-finished {
			transition: width 0.3s;
			background: var(--color-success);
		}

		.stats-value {
			position: absolute;
			inset: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			font-weight: bold;
		}

		.emoji {
			font-size: 3em;
		}

		textarea {
			width: 100%;
			min-height: 300px;
			resize: vertical;
			font-size: 1em;
		}
	</style>
</head>
<body>
	<div id="root"></div>

	<script type="text/babel">
		const {
			useEffect,
			useReducer,
			useRef,
			useState,
		} = React;

		const STORAGE_KEY = 'cards-data';
		const QUESTION_TIMEOUT = 10000;
		const HAS_SPEECH_RECOGNITION = Boolean(window.SpeechRecognition || window.webkitSpeechRecognition);

		const PHASES = {
			INIT: 'INIT',
			MODE: 'MODE',
			QUESTION: 'QUESTION',
			CHECK: 'CHECK',
			ANSWER: 'ANSWER',
			DONE: 'DONE',
		};

		const ACTIONS = {
			MODE: 'MODE',
			QUESTION: 'QUESTION',
			CHECK: 'CHECK',
			ANSWER: 'ANSWER',
			RESET: 'RESET',
		};

		const defaultCardsText = document.querySelector('#cards-data').textContent.trim();
		const defaultCards = parseCards(defaultCardsText);
		const initialCardsText = (localStorage.getItem(STORAGE_KEY) ?? defaultCardsText).trim();

		function parseCards(cardsText) {
			return cardsText
				.split('\n')
				.filter(line => line.trim())
				.map((line, index) => {
					const firstSeparatorIndex = line.indexOf(':');
					const title = line.slice(firstSeparatorIndex + 1).trim();

					const author = firstSeparatorIndex === -1
						? title
						: line.slice(0, firstSeparatorIndex).trim();

					return { author, title };
				})
				.sort(() => Math.random() - 0.5);
		}

		function useCompareSpeech({ enabled, correctAnswer, onResult }) {
			useEffect(() => {
				if (!enabled) {
					return;
				}

				const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

				if (!SpeechRecognition) {
					return;
				}

				const recognition = new SpeechRecognition();
				recognition.lang = 'ru-RU';
				recognition.interimResults = false;
				recognition.continuous = false;

				let timeoutId = null;
				let cancelled = false;

				function cancel() {
					cancelled = true;
					timeoutId && clearTimeout(timeoutId);

					recognition.onresult = null;
					recognition.onerror = null;
					recognition.onend = null;

					try {
						recognition.stop();
					} catch {}
				}

				const replacements = [
					{ find: '12', replace: 'Двенадцать' },
					{ find: '4', replace: 'Четыре' },
					{ find: '2', replace: 'Два' },
				]

				function normalize(text) {
					for (const {find, replace } of replacements) {
						text = text.replaceAll(find, replace);
					}

					return text
						.toLowerCase()
						.replace(/ё/g, 'е')
						.replace(/[^\p{L}\p{N}\s]/gu, '')
						.replace(/\s+/g, ' ')
						.trim();
				}

				new Promise(resolve => {
					timeoutId = setTimeout(() => {
						resolve({ isCorrect: false });
					}, QUESTION_TIMEOUT);

					recognition.onresult = (event) => {
						const answer = event.results[0][0].transcript;
						const isCorrect = normalize(answer) === normalize(correctAnswer);
						resolve({ isCorrect, answer });
					};

					recognition.onerror = (error) => {
						console.error(error);
						resolve({ isCorrect: false, error });
					};

					recognition.onend = () => {
						resolve({ isCorrect: false });
					};

					recognition.start();
				}).then((result) => {
					if (!cancelled) {
						onResult(result);
						cancel();
					}
				});

				return cancel;
			}, [enabled, correctAnswer, onResult]);
		}

		function createInitialState() {
			const initialCards = parseCards(initialCardsText);

			return {
				phase: PHASES.INIT,
				initialCards,
				activeCards: initialCards,
				currentCard: null,
				useSpeechRecognition: false,
				isCorrect: undefined,
				answer: undefined,
				error: undefined,
			};
		}

		function reducer(state, action) {
			switch (action.type) {
				case ACTIONS.MODE: {
					return {
						...state,
						phase: PHASES.MODE,
					}
				}
				case ACTIONS.QUESTION: {
					if (state.activeCards.length > 0) {
						const currentIndex = state.activeCards.findIndex(card => card.author === state.currentCard?.author);
						const nextIndex = (currentIndex + 1) % state.activeCards.length;

						return {
							...state,
							phase: PHASES.QUESTION,
							useSpeechRecognition: action.useSpeechRecognition ?? state.useSpeechRecognition,
							currentCard: state.activeCards[nextIndex],
						};
					}

					return {
						...state,
						phase: PHASES.DONE,
						currentCard: null,
					};
				}
				case ACTIONS.CHECK: {
					return {
						...state,
						phase: PHASES.CHECK,
					}
				}
				case ACTIONS.ANSWER: {
					const nextActiveCards = state.activeCards.filter(card => card.author !== state.currentCard?.author);

					if (!action.isCorrect && state.currentCard) {
						nextActiveCards.push(state.currentCard);
					}

					return {
						...state,
						phase: PHASES.ANSWER,
						activeCards: nextActiveCards,
						isCorrect: action.isCorrect,
						answer: action.answer,
						error: action.error,
					};
				}
				case ACTIONS.RESET: {
					const initialCards = action.initialCards ?? state.initialCards;

					return {
						...state,
						phase: PHASES.INIT,
						initialCards: initialCards,
						activeCards: initialCards,
						currentCard: null,
					};
				}
				default: {
					return state;
				}
			}
		}

		function useCountdown({ enabled, duration, onExpire }) {
			const [countdown, setCountdown] = useState(duration);

			const frameRef = useRef();
			const startRef = useRef();

			useEffect(() => {
				if (!enabled) {
					setCountdown(duration);
					return;
				}

				startRef.current = performance.now();

				function update(now) {
					const elapsed = now - startRef.current;
					const remaining = Math.max(duration - elapsed, 0);
					setCountdown(remaining);

					if (remaining > 0) {
						frameRef.current = requestAnimationFrame(update);
					} else {
						onExpire();
					}
				}

				frameRef.current = requestAnimationFrame(update);
				return () => cancelAnimationFrame(frameRef.current);
			}, [enabled, duration]);

			return countdown;
		}

		function Content({ state }) {
			const { phase, currentCard, answer, error, useSpeechRecognition } = state;

			function getContent() {
				switch (phase) {
					case PHASES.INIT:
					case PHASES.MODE:
						return <>
							<div className="emoji">🐱</div>
							<div className="title">Карточки по литературе для подготовки к ВПР 4 класс</div>
						</>;
					case PHASES.QUESTION:
						return <>
							<div className="author">{currentCard.author}</div>
							<div className="title"></div>
							{ useSpeechRecognition && <div className="speech-desc">Слушаю...</div> }
						</>;
					case PHASES.CHECK:
					case PHASES.ANSWER:
						return <>
							<div className="author">{currentCard.author}</div>
							<div className="title">{currentCard.title}</div>
							{ useSpeechRecognition && answer && <div className="speech-desc error">{ 'Твой ответ: ' + answer }</div> }
						</>;
					case PHASES.DONE:
						return <>
							<div className="emoji">🎉</div>
							<div className="title">Все карточки выучены!</div>
						</>;
					default:
						return null;
				}
			}

			return (
				<div className="content">
					{ getContent() }
				</div>
			);
		}

		function Timer({ state, dispatch }) {
			const { phase, useSpeechRecognition } = state;

			const countdown = useCountdown({
				enabled: phase === PHASES.QUESTION,
				duration: QUESTION_TIMEOUT,
				onExpire: useSpeechRecognition
					? () => {}
					: () => dispatch({ type: ACTIONS.ANSWER }),
			});

			if (phase !== PHASES.QUESTION) {
				return null;
			}

			return (
				<div className="timer">
					<div className="timer-bar" style={{ width: `${(countdown / QUESTION_TIMEOUT) * 100}%` }}></div>
				</div>
			);
		}

		function Buttons({ state, dispatch }) {
			const { phase, useSpeechRecognition } = state;

			function getButtons() {
				switch (phase) {
					case PHASES.INIT:
						return <button className="neutral" onClick={() => dispatch({ type: HAS_SPEECH_RECOGNITION ? ACTIONS.MODE : ACTIONS.QUESTION })}>Начать</button>;
					case PHASES.MODE:
						return <>
							<button className="success" onClick={() => dispatch({ type: ACTIONS.QUESTION, useSpeechRecognition: true })}>Есть микрофон</button>
							<button className="fail" onClick={() => dispatch({ type: ACTIONS.QUESTION, useSpeechRecognition: false })}>Нет микрофона</button>
						</>;
					case PHASES.QUESTION:
						return useSpeechRecognition
							? null
							: <button className="neutral" onClick={() => dispatch({ type: ACTIONS.CHECK })}>Проверить</button>;
					case PHASES.CHECK:
						return <>
							<button className="success" onClick={() => dispatch({ type: ACTIONS.ANSWER, isCorrect: true })}>Знаю</button>
							<button className="fail" onClick={() => dispatch({ type: ACTIONS.ANSWER, isCorrect: false })}>Не знаю</button>
						</>;
					case PHASES.ANSWER:
						return <button className="neutral" onClick={() => dispatch({ type: ACTIONS.QUESTION })}>Дальше</button>;
					case PHASES.DONE:
						return <button className="neutral" onClick={() => dispatch({ type: ACTIONS.RESET })}>Ура!</button>;
					default:
						return null;
				}
			}

			return (
				<div className="buttons">
					{ getButtons() }
				</div>
			);
		}

		function Card({ state, dispatch }) {
			const { phase, currentCard, isCorrect, useSpeechRecognition } = state;

			useCompareSpeech({
				enabled: useSpeechRecognition && phase === PHASES.QUESTION,
				correctAnswer: currentCard?.title ?? '',
				onResult: ({ isCorrect, answer, error}) => dispatch({ type: ACTIONS.ANSWER, isCorrect, answer, error }),
			});

			const cardClass = useSpeechRecognition && phase === PHASES.ANSWER ? (isCorrect ? 'correct' : 'incorrect') : '';

			return (
				<div className={ `box card ${cardClass}` }>
					<Content state={state} />
					<Timer state={state} dispatch={dispatch} />
					<Buttons state={state} dispatch={dispatch} />
				</div>
			);
		}

		function Stats({ state }) {
			const { phase, initialCards, activeCards } = state;

			if (phase === PHASES.INIT) {
				return;
			}

			const totalCount = initialCards.length;
			const finishedCount = initialCards.length - activeCards.length;

			return (
				<div className="stats">
					<div className="stats-finished" style={{ width: `${(finishedCount / totalCount) * 100}%` }} />
					<div className="stats-value">{finishedCount} / {totalCount}</div>
				</div>
			);
		}

		function Editor({ state, dispatch }) {
			const { initialCards } = state;

			const [ editorValue, setEditorValue ] = useState(initialCardsText);
			const [ isEditorOpen, setIsEditorOpen ] = useState(false);

			function editCards() {
				if (!confirm('Весь прогресс будет утерян. Продолжить?')) {
					return;
				}

				dispatch({ type: ACTIONS.RESET });
				setIsEditorOpen(v => !v);
			}

			function saveCards() {
				const parsedCards = parseCards(editorValue);

				if (parsedCards.length === 0) {
					alert('Список карточек пуст');
					return;
				}

				localStorage.setItem(STORAGE_KEY, editorValue);
				dispatch({ type: ACTIONS.RESET, initialCards: parsedCards });
				setIsEditorOpen(false);
			}

			function resetCards() {
				if (!confirm('Все карточки будут возвращены к первоначальному списку. Продолжить?')) {
					return;
				}

				localStorage.setItem(STORAGE_KEY, defaultCardsText);
				setEditorValue(defaultCardsText);
				dispatch({ type: ACTIONS.RESET, initialCards: defaultCards });
			}

			const buttons = isEditorOpen
				? <>
					<button className="success" onClick={saveCards}>Сохранить</button>
					<button className="fail" onClick={resetCards}>Вернуть как было</button>
				</>
				: <button className="neutral" onClick={editCards}>Редактировать карточки</button>

			return (
				<div className="box">
					{ isEditorOpen && <textarea value={editorValue} onChange={e => setEditorValue(e.target.value)} /> }
					<div className="buttons">
						{buttons}
					</div>
				</div>
			);
		}

		function App() {
			const [ state, dispatch ] = useReducer(reducer, undefined, createInitialState);
			const { phase, useSpeechRecognition } = state;

			useEffect(() => {
				if (!useSpeechRecognition && phase === PHASES.ANSWER) {
					dispatch({ type: ACTIONS.QUESTION });
				}
			}, [phase, useSpeechRecognition]);

			return (
				<div className="app" data-phase={phase.toLowerCase()}>
					<Editor state={state} dispatch={dispatch} />
					<Card state={state} dispatch={dispatch} />
					<Stats state={state} />
				</div>
			);
		}

		ReactDOM.createRoot(document.getElementById("root")).render(<App />);
	</script>
</body>
</html>
